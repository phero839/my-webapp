<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해외현지법인 재무제표 변환기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  .header { background: #1e3a5f; color: white; padding: 24px 32px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header p  { font-size: 13px; color: #a8c4e0; margin-top: 4px; }

  .container { max-width: 860px; margin: 32px auto; padding: 0 20px 60px; }

  .notice {
    background: #ebf4ff; border: 1px solid #bee3f8; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; color: #2b6cb0; margin-bottom: 24px;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .notice a { color: #2b6cb0; font-weight: 600; }

  /* 회사 카드 */
  .company-card {
    background: white; border-radius: 12px; padding: 28px;
    box-shadow: 0 1px 6px rgba(0,0,0,.08); margin-bottom: 16px; position: relative;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #e2e8f0;
  }
  .card-title { font-size: 15px; font-weight: 700; color: #1e3a5f; }
  .btn-remove { background: none; border: none; color: #a0aec0; cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; }
  .btn-remove:hover { color: #e53e3e; }

  /* 파일 형식 토글 */
  .fmt-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .fmt-btn {
    flex: 1; padding: 10px; border: 2px solid #e2e8f0; background: white;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
    color: #718096; transition: all .15s;
  }
  .fmt-btn.active { border-color: #1e3a5f; background: #ebf4ff; color: #1e3a5f; }

  /* 파일 업로드 영역 */
  .file-zone {
    border: 2px dashed #cbd5e0; border-radius: 10px; padding: 28px 20px;
    text-align: center; cursor: pointer; transition: all .15s; margin-bottom: 4px;
  }
  .file-zone:hover, .file-zone.drag { border-color: #1e3a5f; background: #f7fafc; }
  .file-zone.has-file { border-color: #38a169; background: #f0fff4; }
  .file-icon { font-size: 32px; margin-bottom: 8px; }
  .file-zone p { font-size: 13px; color: #718096; }
  .file-zone .file-name { font-size: 13px; font-weight: 600; color: #38a169; margin-top: 4px; }
  .file-zone input[type=file] { display: none; }

  /* 입력 그리드 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 7px;
    font-size: 14px; color: #2d3748; outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: #1e3a5f; }
  .field .hint { font-size: 11px; color: #a0aec0; margin-top: 4px; }
  .smbs-link { font-size: 11px; color: #3182ce; text-decoration: none; }
  .smbs-link:hover { text-decoration: underline; }

  /* PDF 분리 업로드 */
  .pdf-files { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .pdf-label { font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 5px; }

  /* 버튼 영역 */
  .actions { margin-top: 20px; display: flex; gap: 10px; }
  .btn-add {
    flex: 1; padding: 12px; border: 2px dashed #cbd5e0; background: white;
    border-radius: 10px; font-size: 14px; color: #718096; cursor: pointer;
    transition: all .15s; font-weight: 600;
  }
  .btn-add:hover { border-color: #1e3a5f; color: #1e3a5f; background: #f7fafc; }

  .btn-convert {
    padding: 14px 40px; background: #1e3a5f; color: white; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background .15s; white-space: nowrap;
  }
  .btn-convert:hover { background: #2a4d7f; }
  .btn-convert:disabled { background: #a0aec0; cursor: not-allowed; }

  /* 로딩 / 결과 */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 100; align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .spinner-box {
    background: white; border-radius: 16px; padding: 40px 60px;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .spinner {
    width: 48px; height: 48px; border: 4px solid #e2e8f0;
    border-top-color: #1e3a5f; border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-box p { font-size: 14px; color: #4a5568; font-weight: 600; }

  .result-bar {
    display: none; background: #f0fff4; border: 1px solid #9ae6b4;
    border-radius: 10px; padding: 16px 20px; margin-top: 20px;
    display: none; align-items: center; gap: 12px;
  }
  .result-bar.show { display: flex; }
  .result-bar .icon { font-size: 24px; }
  .result-bar p { font-size: 14px; color: #276749; font-weight: 600; }

  .error-bar {
    display: none; background: #fff5f5; border: 1px solid #feb2b2;
    border-radius: 10px; padding: 16px 20px; margin-top: 20px;
  }
  .error-bar.show { display: block; }
  .error-bar p { font-size: 13px; color: #c53030; }

  @media (max-width: 600px) {
    .grid-2, .grid-3, .pdf-files { grid-template-columns: 1fr; }
    .btn-convert { width: 100%; }
    .actions { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🌐 해외현지법인 재무제표 변환기</h1>
  <p>원본 재무제표 업로드 → 국세청 제출용 서식 자동 변환</p>
</div>

<div class="container">

  <div class="notice">
    💡 <span>
      환율은 <a href="https://www.smbs.biz" target="_blank">서울외국환중개(SMBS)</a>에서 확인하세요.
      재무상태표 = 기말환율(12/31), 손익계산서 = 연평균환율
    </span>
  </div>

  <form id="mainForm">
    <div id="companies"></div>

    <div class="actions">
      <button type="button" class="btn-add" onclick="addCompany()">+ 회사 추가</button>
      <button type="submit" class="btn-convert" id="convertBtn">Excel 변환 다운로드 ↓</button>
    </div>
  </form>

  <div class="result-bar" id="resultBar">
    <span class="icon">✅</span>
    <p>변환 완료! 파일이 다운로드되었습니다.</p>
  </div>
  <div class="error-bar" id="errorBar">
    <p id="errorMsg"></p>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="spinner-box">
    <div class="spinner"></div>
    <p>변환 중입니다...</p>
    <p style="font-size:12px;color:#a0aec0;margin-top:6px">잠시만 기다려주세요</p>
  </div>
</div>

<script>
let companyCount = 0;

const CURRENCIES = [
  "USD","JPY","EUR","GBP","CAD","CHF","AUD","NZD","CNH","CNY","HKD",
  "TWD","MNT","KZT","THB","SGD","IDR","MYR","PHP","VND","BND",
  "INR","PKR","BDT","KHR","MOP","NPR","LKR","UZS","MMK",
  "MXN","BRL","ARS","CLP","COP",
  "SEK","DKK","NOK","RUB","HUF","PLN","CZK","RON",
  "SAR","QAR","ILS","JOD","KWD","BHD","AED","TRY","OMR",
  "ZAR","EGP","KES","LYD","ETB","FJD"
];

function addCompany() {
  const idx = companyCount++;
  const div = document.createElement("div");
  div.className = "company-card";
  div.id = `card_${idx}`;
  div.innerHTML = `
    <div class="card-header">
      <span class="card-title">회사 ${idx+1}</span>
      <button type="button" class="btn-remove" onclick="removeCompany(${idx})" title="삭제">✕</button>
    </div>

    <!-- 파일 형식 선택 -->
    <div class="fmt-toggle">
      <button type="button" class="fmt-btn active" id="fmt_excel_${idx}" onclick="setFmt(${idx},'excel')">📊 엑셀 (Excel)</button>
      <button type="button" class="fmt-btn"        id="fmt_pdf_${idx}"   onclick="setFmt(${idx},'pdf')">📄 PDF (BS + PL)</button>
    </div>
    <input type="hidden" name="fmt_${idx}" id="fmtVal_${idx}" value="excel">

    <!-- 엑셀 업로드 -->
    <div id="excelZone_${idx}">
      <div class="file-zone" id="dropExcel_${idx}" onclick="document.getElementById('fileExcel_${idx}').click()"
           ondragover="handleDragOver(event,this)" ondragleave="handleDragLeave(event,this)"
           ondrop="handleDrop(event,'fileExcel_${idx}',this)">
        <div class="file-icon">📂</div>
        <p>클릭하거나 파일을 드래그하세요</p>
        <p style="font-size:11px;color:#cbd5e0;margin-top:4px">.xlsx 파일</p>
        <p class="file-name" id="nameExcel_${idx}"></p>
        <input type="file" name="excel_${idx}" id="fileExcel_${idx}" accept=".xlsx,.xls"
               onchange="showName(this,'nameExcel_${idx}','dropExcel_${idx}')">
      </div>
    </div>

    <!-- PDF 업로드 -->
    <div id="pdfZone_${idx}" style="display:none">
      <div class="file-zone" id="dropPDF_${idx}" onclick="document.getElementById('filePDF_${idx}').click()"
           ondragover="handleDragOver(event,this)" ondragleave="handleDragLeave(event,this)"
           ondrop="handleDrop(event,'filePDF_${idx}',this)">
        <div class="file-icon">📄</div>
        <p>재무제표 PDF 업로드 (BS·PL 모두 포함)</p>
        <p style="font-size:11px;color:#cbd5e0;margin-top:4px">.pdf 파일</p>
        <p class="file-name" id="namePDF_${idx}"></p>
        <input type="file" name="pdf_${idx}" id="filePDF_${idx}" accept=".pdf"
               onchange="showName(this,'namePDF_${idx}','dropPDF_${idx}')">
      </div>
    </div>

    <!-- 입력 필드 -->
    <div class="grid-2">
      <div class="field">
        <label>회사명 *</label>
        <input type="text" name="company_${idx}" placeholder="FACTBLOCK US LLC" required>
      </div>
      <div class="field">
        <label>시트명 *</label>
        <input type="text" name="sheet_${idx}" placeholder="미국" required>
        <p class="hint">NTS 서식 시트 이름 (미국, 싱가폴, 일본 등)</p>
      </div>
    </div>
    <div class="grid-3">
      <div class="field">
        <label>통화</label>
        <select name="currency_${idx}">
          ${CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join("")}
        </select>
      </div>
      <div class="field">
        <label>기말환율 (12/31) *
          <a class="smbs-link" href="https://www.smbs.biz" target="_blank">↗ SMBS</a>
        </label>
        <input type="number" name="eoy_${idx}" step="0.0001" placeholder="1434.9000" required>
      </div>
      <div class="field">
        <label>연평균환율 *
          <a class="smbs-link" href="https://www.smbs.biz" target="_blank">↗ SMBS</a>
        </label>
        <input type="number" name="avg_${idx}" step="0.0001" placeholder="1422.2200" required>
      </div>
    </div>
    <div class="grid-2" style="margin-top:14px">
      <div class="field">
        <label>전기이월 이익잉여금 (원화)</label>
        <input type="number" name="prior_${idx}" placeholder="0" value="0">
        <p class="hint">전년도 차기이월 이익잉여금 (원화 기준). 없으면 0</p>
      </div>
    </div>
  `;
  document.getElementById("companies").appendChild(div);
}

function removeCompany(idx) {
  const card = document.getElementById(`card_${idx}`);
  if (card) card.remove();
}

function setFmt(idx, fmt) {
  document.getElementById(`fmtVal_${idx}`).value = fmt;
  document.getElementById(`excelZone_${idx}`).style.display = fmt === "excel" ? "" : "none";
  document.getElementById(`pdfZone_${idx}`).style.display   = fmt === "pdf"   ? "" : "none";
  document.getElementById(`fmt_excel_${idx}`).classList.toggle("active", fmt === "excel");
  document.getElementById(`fmt_pdf_${idx}`).classList.toggle("active", fmt === "pdf");
}

function showName(input, nameId, zoneId) {
  const name = input.files[0]?.name || "";
  document.getElementById(nameId).textContent = name;
  document.getElementById(zoneId).classList.toggle("has-file", !!name);
}

function handleDragOver(e, el) { e.preventDefault(); el.classList.add("drag"); }
function handleDragLeave(e, el) { el.classList.remove("drag"); }
function handleDrop(e, inputId, el) {
  e.preventDefault(); el.classList.remove("drag");
  const input = document.getElementById(inputId);
  const nameId = inputId.replace("file","name").replace(/(_\d+)$/, "$1"); // best-effort
  if (e.dataTransfer.files.length) {
    const dt = new DataTransfer();
    dt.items.add(e.dataTransfer.files[0]);
    input.files = dt.files;
    input.dispatchEvent(new Event("change"));
  }
}

document.getElementById("mainForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("convertBtn");
  const overlay = document.getElementById("overlay");
  const resultBar = document.getElementById("resultBar");
  const errorBar  = document.getElementById("errorBar");

  resultBar.classList.remove("show");
  errorBar.classList.remove("show");
  btn.disabled = true;
  overlay.classList.add("show");

  try {
    const fd = new FormData(e.target);
    const resp = await fetch("/convert", { method: "POST", body: fd });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({error: resp.statusText}));
      throw new Error(err.error || resp.statusText);
    }

    // 다운로드
    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "해외현지법인재무제표_변환.xlsx";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    resultBar.classList.add("show");
  } catch(err) {
    document.getElementById("errorMsg").textContent = "오류: " + err.message;
    errorBar.classList.add("show");
  } finally {
    overlay.classList.remove("show");
    btn.disabled = false;
  }
});

// 첫 카드 자동 추가
addCompany();
</script>
</body>
</html>
